<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#6366f1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Driver Check-in — Driver Attendance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0e1a;
      --card: #1a1f36;
      --border: rgba(148,163,184,0.12);
      --accent: #6366f1;
      --accent2: #8b5cf6;
      --grad: linear-gradient(135deg, #6366f1, #8b5cf6);
      --text: #f1f5f9;
      --muted: #94a3b8;
      --success: #22c55e;
      --success-bg: rgba(34,197,94,0.12);
      --error: #ef4444;
      --error-bg: rgba(239,68,68,0.12);
      --warning: #f59e0b;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed;
      top: -30%;
      left: -20%;
      width: 140%;
      height: 60%;
      background: radial-gradient(ellipse at center, rgba(99,102,241,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .container {
      width: 100%;
      max-width: 400px;
      animation: fadeUp .5s ease;
      position: relative;
      z-index: 1;
    }

    .logo { text-align: center; margin-bottom: 24px; margin-top: 10px; }
    .logo-title {
      font-size: 1.2rem;
      font-weight: 800;
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .driver-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 20px;
      text-align: center;
    }

    .driver-name { font-size: 1.4rem; font-weight: 800; margin-bottom: 4px; }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 9999px;
      font-size: 0.85rem;
      font-weight: 600;
      margin-top: 12px;
    }
    .status-none    { background: rgba(148,163,184,0.12); color: var(--muted); }
    .status-in      { background: var(--success-bg); color: var(--success); }
    .status-done    { background: rgba(99,102,241,0.12); color: var(--accent); }

    .clock-display {
      font-size: 2.2rem;
      font-weight: 800;
      text-align: center;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
      font-variant-numeric: tabular-nums;
    }
    .date-display {
      text-align: center;
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 24px;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    .btn {
      width: 100%;
      padding: 16px 12px;
      border: none;
      border-radius: 14px;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .2s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-checkin { background: var(--grad); color: white; box-shadow: 0 4px 16px rgba(99,102,241,0.3); }
    .btn-checkout { background: linear-gradient(135deg, #22c55e, #16a34a); color: white; box-shadow: 0 4px 16px rgba(34,197,94,0.3); }
    .btn-history { background: rgba(255,255,255,0.1); color: white; grid-column: span 2; padding: 14px; flex-direction: row; }

    .result-msg {
      border-radius: 12px;
      padding: 14px;
      font-size: 0.9rem;
      font-weight: 600;
      text-align: center;
      margin-bottom: 16px;
      display: none;
    }
    .result-msg.success { background: var(--success-bg); color: var(--success); display: block; }
    .result-msg.error   { background: var(--error-bg); color: var(--error); display: block; }

    /* Modal for History */
    .modal {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(4px);
      z-index: 100;
      display: none;
      align-items: center; justify-content: center;
      padding: 20px;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: var(--card);
      width: 100%; max-width: 400px;
      border-radius: 20px;
      border: 1px solid var(--border);
      max-height: 80vh;
      display: flex; flex-direction: column;
    }
    .modal-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
      font-weight: 700;
    }
    .close-btn { background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; }
    .modal-body { padding: 0; overflow-y: auto; flex: 1; }
    
    .history-item {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }
    .history-item:last-child { border-bottom: none; }
    .history-date { font-weight: 600; margin-bottom: 4px; }
    .history-type { font-size: 0.75rem; padding: 2px 6px; border-radius: 4px; background: rgba(255,255,255,0.1); color: var(--muted); }
    .history-times { font-size: 0.85rem; color: var(--muted); text-align: right; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <div class="logo-title">🚗 Driver Attendance</div>
    </div>

    <div id="loading" style="text-align:center; color:var(--muted); padding: 40px 0;">
      Loading...
    </div>

    <div id="main" style="display:none">
      <div class="clock-display" id="clock"></div>
      <div class="date-display" id="date-display"></div>

      <div class="driver-card">
        <div class="driver-name" id="driver-name-el"></div>
        <div class="status-badge" id="status-badge"></div>
        
        <div style="margin-top:20px; background:rgba(0,0,0,0.2); padding:12px; border-radius:12px; text-align:left;">
          <div style="display:flex; justify-content:space-between; margin-bottom:8px; font-size:0.9rem;">
            <span style="color:var(--muted)">Clock In</span>
            <strong id="info-checkin">—</strong>
          </div>
          <div style="display:flex; justify-content:space-between; font-size:0.9rem;">
            <span style="color:var(--muted)">Clock Out</span>
            <strong id="info-checkout">—</strong>
          </div>
        </div>
      </div>

      <div class="result-msg" id="result-msg"></div>

      <div class="menu-grid">
        <button class="btn btn-checkin" id="btn-checkin" onclick="doCheckIn()">
          <span style="font-size:1.5rem">📍</span>
          <span>Clock In</span>
        </button>
        <button class="btn btn-checkout" id="btn-checkout" onclick="doCheckOut()">
          <span style="font-size:1.5rem">✅</span>
          <span>Clock Out</span>
        </button>
        <button class="btn btn-history" onclick="showHistory()">
          <span>📅</span> My Attendance Log (This Month)
        </button>
      </div>
    </div>
  </div>

  <!-- History Modal -->
  <div class="modal" id="history-modal">
    <div class="modal-content">
      <div class="modal-header">
        <span>Attendance History</span>
        <button class="close-btn" onclick="closeHistory()">&times;</button>
      </div>
      <div class="modal-body" id="history-list">
        <div style="padding:20px; text-align:center; color:var(--muted);">Loading records...</div>
      </div>
    </div>
  </div>

  <script>
    const driverId = location.pathname.split('/').pop();

    function updateClock() {
      const now = new Date();
      const timeStr = now.toLocaleTimeString('en-PH', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });
      const dateStr = now.toLocaleDateString('en-PH', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
      document.getElementById('clock').textContent = timeStr;
      document.getElementById('date-display').textContent = dateStr;
    }
    setInterval(updateClock, 1000);
    updateClock();

    function fmtTime(iso) {
      if (!iso) return '—';
      return new Date(iso).toLocaleTimeString('en-PH', { hour: '2-digit', minute: '2-digit', hour12: true });
    }

    function renderStatus(status, record) {
      const badge = document.getElementById('status-badge');
      const btnIn  = document.getElementById('btn-checkin');
      const btnOut = document.getElementById('btn-checkout');

      document.getElementById('info-checkin').textContent  = fmtTime(record?.clockIn);
      document.getElementById('info-checkout').textContent = fmtTime(record?.clockOut);

      // 버튼 상태 관리
      if (status === 'not_checked_in') {
        badge.textContent = '● Not Clocked In';
        badge.className = 'status-badge status-none';
        btnIn.disabled = false;
        btnOut.disabled = true;
      } else if (status === 'checked_in') {
        badge.textContent = '● Working';
        badge.className = 'status-badge status-in';
        btnIn.disabled = true;
        btnOut.disabled = false;
      } else if (status === 'completed') {
        badge.textContent = '✓ Clocked Out';
        badge.className = 'status-badge status-done';
        btnIn.disabled = true;
        btnOut.disabled = true;
      }
    }

    async function init() {
      try {
        const drvRes = await fetch(`/api/drivers/${driverId}`);
        if (!drvRes.ok) throw new Error('Driver not found.');
        const drv = await drvRes.json();

        document.getElementById('driver-name-el').textContent = drv.name;

        await loadTodayStatus();

        document.getElementById('loading').style.display = 'none';
        document.getElementById('main').style.display    = 'block';
      } catch (e) {
        document.getElementById('loading').textContent = '⚠️ ' + e.message;
      }
    }

    async function loadTodayStatus() {
      const stRes = await fetch(`/api/attendance/status/${driverId}`);
      const st = await stRes.json();

      const today = new Date().toISOString().slice(0, 10);
      const attRes = await fetch(`/api/attendance?driverId=${driverId}&month=${today.slice(0, 7)}`);
      const recs = await attRes.json();
      const todayRec = recs.find(r => r.date === today) || null;

      renderStatus(st.status, todayRec);
    }

    function getLocation() {
      return new Promise((resolve) => {
        if (!navigator.geolocation) { resolve(null); return; }
        navigator.geolocation.getCurrentPosition(
          pos => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude, accuracy: pos.coords.accuracy }),
          ()  => resolve(null),
          { timeout: 8000, maximumAge: 0, enableHighAccuracy: true }
        );
      });
    }

    async function doCheckIn() {
      if(!confirm('Do you want to clock in?')) return;
      const btnIn = document.getElementById('btn-checkin');
      btnIn.disabled = true;
      btnIn.innerHTML = '<span style="font-size:1.5rem">📡</span><span>Getting location...</span>';
      try {
        const location = await getLocation();
        const res = await fetch('/api/attendance/checkin', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ driverId, location })
        });
        const data = await res.json();
        if (res.ok) {
          showResult('success', location ? '✅ Clocked in! Location saved.' : '✅ Clocked in! (Location unavailable)');
          await loadTodayStatus();
        } else {
          showResult('error', '⚠️ ' + data.error);
          btnIn.disabled = false;
        }
      } catch (e) {
        showResult('error', '⚠️ Network error occurred.');
        btnIn.disabled = false;
      } finally {
        btnIn.innerHTML = '<span style="font-size:1.5rem">📍</span><span>Clock In</span>';
      }
    }

    async function doCheckOut() {
      if(!confirm('Do you want to clock out?')) return;
      const btnOut = document.getElementById('btn-checkout');
      btnOut.disabled = true;
      btnOut.innerHTML = '<span style="font-size:1.5rem">📡</span><span>Getting location...</span>';
      try {
        const location = await getLocation();
        const res = await fetch('/api/attendance/checkout', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ driverId, location })
        });
        const data = await res.json();
        if (res.ok) {
          showResult('success', location
            ? `✅ Clocked out! (Today: ${data.record.hoursWorked} hours) Location saved.`
            : `✅ Clocked out! (Today: ${data.record.hoursWorked} hours)`);
          await loadTodayStatus();
        } else {
          showResult('error', '⚠️ ' + data.error);
          btnOut.disabled = false;
        }
      } catch (e) {
        showResult('error', '⚠️ Network error occurred.');
        btnOut.disabled = false;
      } finally {
        btnOut.innerHTML = '<span style="font-size:1.5rem">✅</span><span>Clock Out</span>';
      }
    }

    async function showHistory() {
      document.getElementById('history-modal').classList.add('active');
      const listEl = document.getElementById('history-list');
      listEl.innerHTML = '<div style="padding:20px; text-align:center; color:var(--muted);">Loading...</div>';
      
      try {
        const today = new Date().toISOString().slice(0, 10);
        const res = await fetch(`/api/attendance?driverId=${driverId}&month=${today.slice(0, 7)}`);
        const recs = await res.json();
        
        if (recs.length === 0) {
          listEl.innerHTML = '<div style="padding:20px; text-align:center; color:var(--muted);">No attendance records for this month.</div>';
          return;
        }

        let html = '';
        recs.slice().reverse().forEach(r => {
          if (!r.worked) return;
          const typeStr = r.dayType === 'holiday' ? 'Holiday' : 'Weekday';
          html += `
            <div class="history-item">
              <div>
                <div class="history-date">${r.date}</div>
                <span class="history-type">${typeStr}</span> <span style="font-size:0.8rem;color:var(--muted);margin-left:4px;">${r.hoursWorked} hrs</span>
              </div>
              <div class="history-times">
                <div>In: ${fmtTime(r.clockIn)}</div>
                <div>Out: ${fmtTime(r.clockOut)}</div>
              </div>
            </div>
          `;
        });
        listEl.innerHTML = html || '<div style="padding:20px; text-align:center; color:var(--muted);">No attendance records for this month.</div>';
      } catch (e) {
        listEl.innerHTML = '<div style="padding:20px; text-align:center; color:var(--error);">Failed to load records.</div>';
      }
    }

    function closeHistory() {
      document.getElementById('history-modal').classList.remove('active');
    }

    function showResult(type, msg) {
      const el = document.getElementById('result-msg');
      el.textContent = msg;
      el.className = `result-msg ${type}`;
      setTimeout(() => { el.style.display = 'none'; }, 5000);
    }

    init();
  </script>
</body>
</html>
